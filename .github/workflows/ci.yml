name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        cxx-compiler: [ g++, clang++, cl ]
        include:
          - build-type: Release
          - os: windows-latest
            cxx-compiler: g++
            generator: Ninja
          - os: windows-latest
            cxx-compiler: clang++
            generator: Ninja
        exclude:
          - os: ubuntu-latest
            cxx-compiler: cl

    steps:
      - uses: actions/checkout@v5

      - name: Install Ninja
        uses: lukka/get-cmake@latest

      - name: Setup MinGW
        if: matrix.os == 'windows-latest' && matrix.cxx-compiler == 'g++'
        uses: egor-tensin/setup-gcc@v1
        with:
          method: link

      - name: Configure
        shell: bash
        run: >
          cmake -B build
          ${{ matrix.generator && format('-G "{0}"', matrix.generator) || '' }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx-compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build-type }} --parallel

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build-type }}
